<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký</title>
    <!-- <link rel="stylesheet" href="./public/css/home.css"> -->
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
    <link rel="stylesheet" href="./register.css">
</head>

<body>
    <div id="formLogin">
        <h1>Đăng Ký</h1>
        <div id="gachDuoi"></div>
        <div id="textEmail">
            <i class="uil uil-envelope icon"></i>
            <input type="email" name="email" id="email" placeholder="Enter your email">
        </div>
        <div id="textUsername">
            <i class="uil uil-user icon"></i>
            <input type="text" id="username" placeholder="Enter your Username">
        </div>
        <div id="textPassword">
            <i class="uil uil-lock icon"></i>
            <input type="password" id="password" placeholder="Enter your password">
            <i id="matDong" class="uil uil-eye-slash showHide"></i>
        </div>
        <div id="textRePassword">
            <i class="uil uil-lock icon"></i>
            <input type="password" id="password" placeholder="Enter your Re-password">
            <i id="matDong" class="uil uil-eye-slash showHide"></i>
        </div>
        <div id="checkedPassword">
            <input type="checkbox" value="" checked="checked" />
            <span>I accepted all terms and conditions</span>
        </div>
        <button id="btnLogin" onclick="register()">Signup</button>

        <div id="linkNotLogin">
            <span>Not a member?</span>
            <a id="linkRegister" href="./login.html">Đăng Nhập Ngay</a>
        </div>

    </div>
</body>

<script src="../js/jquery-3.6.3.min.js"></script>

<script>
    const API_PATH = "http://localhost:4000"
    function register() {
        dangNhapRong = document.getElementById("username").value
        if (dangNhapRong != "") {

            $.ajax({
                url: `${API_PATH}/register`,
                type: 'POST',
                data: {
                    email: $('#email').val(),
                    username: $('#username').val(),
                    password: $('#password').val()
                }
            })
                .then(data => {
                    console.log('dang ky thanh cong')
                    console.log(data);
                    window.location.href = "./login.html"
                })
                .catch(err => {
                    console.log('dang ky that bai')
                    console.log(err)
                })
        } else {
            console.error('Lỗi nè !');
        }
    }

    /////////////////////////-- Register --///////////////////////////////////////
    const pwHide = document.querySelectorAll(".showHide"),
        pwShow = document.querySelectorAll(".showShow"),
        pwFields456 = document.querySelectorAll("#username"),
        pwFields123 = document.querySelectorAll("#password")

    //   js code to show/hide password and change icon
    pwShow.forEach(eyeIcon => {
        eyeIcon.addEventListener("click", () => {
            pwFields456.forEach(pwField => {
                if (pwField.type === "password") {
                    pwField.type = "text";
                    pwShow.forEach(icon => {
                        icon.classList.replace("uil-eye-slash", "uil-eye");
                    })
                } else {
                    pwField.type = "password";
                    pwShow.forEach(icon => {
                        icon.classList.replace("uil-eye", "uil-eye-slash");
                    })
                }
            })
        })
    })

    pwHide.forEach(eyeIcon => {
        eyeIcon.addEventListener("click", () => {
            pwFields123.forEach(pwField => {
                if (pwField.type === "password") {
                    pwField.type = "text";
                    pwHide.forEach(icon => {
                        icon.classList.replace("uil-eye-slash", "uil-eye");
                    })
                } else {
                    pwField.type = "password";
                    pwHide.forEach(icon => {
                        icon.classList.replace("uil-eye", "uil-eye-slash");
                    })
                }
            })
        })
    })

</script>

</html>
