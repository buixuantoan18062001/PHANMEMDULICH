    <br>
    <!-- Button trigger modal -->
    <button type="button" class="btn btn-primary" data-toggle="modal" data-target="#exampleModalCenter">
        Thêm Địa Điểm
    </button>
    <br>
    <br>

    <div class="container">
        <!--POST Modal -->
        <div class="modal fade" id="exampleModalCenter" tabindex="-1" role="dialog"
            aria-labelledby="exampleModalCenterTitle" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="exampleModalLongTitle">Form Thêm Địa Điểm</h5>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    <div class="modal-body">
                        <!-- From -->
                        <form class="form-user">
                            <div class="form-group">
                                <label>name</label>
                                <input type="text" class="form-control" name="name" placeholder="Enter name">
                            </div>
                            <div class="form-group">
                                <label>address</label>
                                <input type="text" class="form-control" name="address" placeholder="Enter address">
                            </div>
                            <div class="form-group">
                                <label>address_link</label>
                                <input type="text" class="form-control" name="address_link"
                                    placeholder="Enter address_link">
                            </div>
                            <div class="form-group">
                                <label>image_link</label>
                                <input type="text" class="form-control" name="image_link"
                                    placeholder="Enter image_link">
                            </div>
                            <div class="form-group">
                                <label>website</label>
                                <input type="text" class="form-control" name="website" placeholder="Enter website">
                            </div>
                            <div class="form-group">
                                <label>sodienthoai</label>
                                <input type="number" class="form-control" name="sodienthoai"
                                    placeholder="Enter sodienthoai">
                            </div>
                            <div class="form-group">
                                <label>latlong</label>
                                <input type="text" class="form-control" name="latlong" placeholder="Enter latlong">
                            </div>
                            <!-- weather  -->
                            <div class="form-group">
                                <label>weather</label>
                                <div class="radio">
                                    <label class="checkbox-inline">
                                        <input type="radio" name="weather" checked="checked" value="Trời nắng">Trời nắng</label>
                                    <label class="checkbox-inline">
                                        <input type="radio" name="weather" value="Trời mây">Trời mây</label>
                                    <label class="checkbox-inline">
                                        <input type="radio" name="weather" value="Trời mưa">Trời mưa</label>
                                </div>
                            </div>
                            <!-- Ranking  --> 
                            <div class="form-group">
                                <label>ranking</label>
                                <input type="text" class="form-control" name="ranking"
                                    placeholder="Enter ranking">
                            </div>
                            <!-- Ranking  --> 
                            <!-- Time  -->
                            <div class="form-group">
                                <label>day_or_night</label>
                                <div class="radio">
                                    <label class="checkbox-inline">
                                        <input type="radio" name="day_or_night" checked="checked" value="Ngày">Ngày</label>
                                    <label class="checkbox-inline">
                                        <input type="radio" name="day_or_night" value="Đêm">Đêm</label>
                                </div>
                            </div>
                            <!-- Time -->
                            <button type="submit" class="btn btn-primary">Save</button>
                        </form>
                        <!-- From -->
                    </div>
                </div>
            </div>
        </div>

                                    <label class="checkbox-inline">

                                    <label class="checkbox-inline">
                                        <input type="radio" name="weather" value="Trời mưa">Trời mưa</label>
                                </div>
                            </div>
                            <!-- Weather  -->

                            <!-- Ranking  -->                           
                            <div class="form-group">
                                <label>ranking</label>
                                <input type="text" class="form-control" name="ranking"
                                    placeholder="Enter ranking">
                            </div>
                            <!-- Ranking  -->     

                            <!-- Time  -->
                            <div class="form-group">
                                <label>day_or_night</label>
                                <div class="radio">
                                    <label class="checkbox-inline">
                                        <input type="radio" name="day_or_night" checked="checked" value="Ngày">Ngày</label>
                                    <label class="checkbox-inline">
                                        <input type="radio" name="day_or_night" value="Đêm">Đêm</label>
                                </div>
                            </div>
                            <!-- Time -->
                            <button type="submit" class="btn btn-primary">Save</button>

                </div>
            </div>
        </div>
        <!--  -->
    </div>

    <div>
        <table id="table-user" class="table table-bordered">
            <tr>
                <th>name</th>
                <th>address</th>
                <th>address_link</th>
                <th>image_link</th>
                <th>website</th>
                <th>sodienthoai</th>
